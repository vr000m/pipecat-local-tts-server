name: release

# Build and publish to PyPI via Trusted Publishing (OIDC) — no API token, no
# secret in the repo or in ~/.pypirc. Triggered when a GitHub Release is
# *published* (not on a draft, and not on a bare tag push), so cutting a release
# is the single deliberate action that ships to PyPI.
#
# ONE-TIME PyPI SETUP (already-existing project, so this is added under settings,
# not at first upload):
#   1. PyPI → the project → Manage → Publishing → "Add a new pending publisher"
#      / trusted publisher (GitHub):
#        Owner:            vr000m
#        Repository:       pipecat-local-tts-server
#        Workflow name:    release.yml
#        Environment name: pypi
#   2. GitHub → repo Settings → Environments → create an environment named `pypi`
#      (optionally add protection rules, e.g. required reviewers, before publish).
# Until both exist the publish step will fail the OIDC token exchange.

on:
  release:
    types: [published]

permissions: {}

jobs:
  # Build the sdist + wheel and verify the release tag matches the packaged
  # version, so a mistagged release can never ship a mismatched artifact. The
  # build job needs no special permissions.
  build:
    runs-on: ubuntu-latest
    # Explicit so the job does not rely on the repo being public: with the
    # top-level `permissions: {}`, `contents` would otherwise be `none` and
    # `actions/checkout` could not clone a private repo.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          python-version: "3.12"
      - name: Verify release tag matches pyproject version
        run: |
          pkg_version=$(grep -m1 -E '^version *= *"' pyproject.toml | sed -E 's/^version *= *"([^"]+)".*/\1/')
          tag="${GITHUB_REF_NAME#v}"
          echo "tag=$tag pyproject_version=$pkg_version"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::release tag '$GITHUB_REF_NAME' does not match pyproject version '$pkg_version'"
            exit 1
          fi
      - name: Build sdist + wheel
        run: uv build
      - name: Check distribution metadata
        run: uvx twine check dist/*
      - name: Upload built distributions
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: dist
          path: dist/

  # Publish to PyPI using Trusted Publishing. Isolated from the build job so the
  # only job holding `id-token: write` does nothing but download the vetted
  # artifacts and upload them — minimal blast radius.
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pipecat-local-tts-server/
    permissions:
      id-token: write # OIDC token for Trusted Publishing — the only privilege needed.
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
